<!DOCTYPE html>
<html lang="en">
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8">
    <meta name="description" content="Lorena Foundation - A non-profit empowering communities through education, health, equality, and sustainable development in Uganda and beyond.">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>">

    <!-- SEO -->
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0a3a5c">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Lorena Foundation">
    <meta property="og:title" content="Lorena Foundation - Together We Can Transform Lives">
    <meta property="og:description" content="A non-profit empowering communities through education, health, equality, and sustainable development.">
    <meta property="og:image" content="/icons/lorena_foundation_logo6.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Lorena Foundation - Together We Can Transform Lives">
    <meta name="twitter:description" content="A non-profit empowering communities through education, health, equality, and sustainable development.">
    <meta name="twitter:image" content="/icons/lorena_foundation_logo6.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="icons/favicon.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  </head>
  <body>
    <!-- quasar:entry-point -->
  </body>
</html>
